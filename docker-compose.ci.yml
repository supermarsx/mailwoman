# Mailwoman V6 CI stack — the pluggable-Postgres + Redis/Valkey cache services
# (plan §5, §11). ACTIVATED by t6-e12 (the e0 scaffold left these STUBBED): the
# services boot the dual-backend store job, the mw-cache-vs-Valkey job, and the
# live full-stack E2E. Both are NETWORK-ONLY CI services (mere aggregation, same
# posture as Dovecot/Radicale in docker-compose.dev.yml) — out of the cargo-deny
# dependency scope by design (documented in deny.toml).
#
#   docker compose -f docker-compose.ci.yml up -d --wait postgres valkey
#       -> the dual-backend store job (SQLite in-memory AND live Postgres) + the
#          migrate-store smoke (SQLite→Postgres copy + verify) + the
#          mw-cache-vs-Valkey job (+ a Redis-down degradation leg) + live E2E.
#
# The store tests read the Postgres DSN from DATABASE_URL_PG (or MW_TEST_PG); the
# mw-cache tests read the Redis/Valkey URL from MW_TEST_REDIS_URL (or MW_TEST_REDIS
# / REDIS_URL). Both services are EPHEMERAL — no named volumes, so a fresh CI run
# always starts from empty state (the migrate-store smoke TRUNCATEs regardless).
#
# Valkey (BSD-3-Clause, Linux Foundation fork) is used instead of redis:7.4+
# (RSALv2/SSPL, source-available NOT permissive) to keep the deployment story
# license-clean; `fred` is protocol-compatible with both (docs note Redis compat).

name: mailwoman-ci

services:
  # PostgreSQL 16 — the real Postgres backend for the dual-backend store job (e1)
  # + the migrate-store smoke + live E2E (e13). SQLite stays the DEFAULT; Postgres
  # is opt-in via DSN. Ephemeral (no volume): CI starts from an empty database.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mailwoman
      POSTGRES_PASSWORD: mailwoman
      POSTGRES_DB: mailwoman
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailwoman -d mailwoman"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # Valkey 8 — the Redis-protocol cache for mw-cache tests (e2) + live E2E (e13).
  # Ephemeral (no persistence): purely an accelerator, never authoritative.
  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # ── V7 (26.8.0) CI services (plan §5) — ACTIVATED by t7-e15.
  # Both are NETWORK-ONLY services (mere aggregation, same posture as postgres/valkey
  # above and Dovecot/Radicale in docker-compose.dev.yml) — OUT of the cargo-deny
  # dependency scope by design (documented in deny.toml). Ephemeral (no volumes): a
  # fresh CI run starts from the seeded LDIF each time.
  #
  #   docker compose -f docker-compose.ci.yml up -d --wait openldap mock-assist
  #       -> the directory-vs-openldap live-E2E (GAL search / group expand-before-send
  #          / S-MIME cert + photo lookup / multi-directory priority / StartTLS/LDAPS)
  #          + the assist-mock deterministic offline Assist E2E.

  # OpenLDAP (OpenLDAP Public License — permissive) — seeded LDIF (users, groups,
  # S/MIME userCertificate;binary, jpegPhoto) for mw-directory's live-E2E (e16).
  # The seed LDIF lives at scripts/openldap/ldifs/ (mounted read-only). Admin bind
  # is cn=admin,dc=example,dc=com / adminpassword; the LDAP-bind test users are
  # uid={alice,bob,carol},ou=people,dc=example,dc=com. Bitnami serves LDAP on 1389
  # (StartTLS) and LDAPS on 1636 as an unprivileged (non-root) listener.
  openldap:
    image: bitnami/openldap:2.6
    environment:
      LDAP_ROOT: "dc=example,dc=com"
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: "adminpassword"
      LDAP_SKIP_DEFAULT_TREE: "yes"          # the seed LDIF defines the whole tree
      LDAP_CUSTOM_LDIF_DIR: "/ldifs"         # seeded users/groups/certs/photos
      LDAP_ALLOW_ANON_BINDING: "no"
    volumes:
      - ./scripts/openldap/ldifs:/ldifs:ro
    ports:
      - "1389:1389"                          # LDAP (StartTLS)
      - "1636:1636"                          # LDAPS
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://127.0.0.1:1389 -b dc=example,dc=com -s base >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # Mock OpenAI-compatible (+ Anthropic) endpoint — a tiny in-repo fixture HTTP
  # server (scripts/mock-assist/server.py, stdlib-only Python) returning canned
  # chat/embeddings/transcription so the Assist E2E is deterministic + offline
  # (§14). Nightly optional Ollama/OpenAI/Anthropic behind secrets is a SEPARATE
  # secret-gated job (see .github/workflows/ci.yml `live-interop`).
  mock-assist:
    build:
      context: .
      dockerfile: scripts/mock-assist/Dockerfile
    ports:
      - "8199:8199"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8199/healthz').read()==b'ok' else 1)\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 3s
