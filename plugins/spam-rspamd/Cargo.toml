[package]
name = "spam-rspamd"
description = "Rspamd spam-trainer plugin (t10 §3 e6, SPEC §10.8): a thin wasm32-wasip2 spam-action component that classifies/trains ham/spam by talking to an rspamd controller over the host http-fetch under a net allowlist — no C linkage. Scaffold stub (t10-e0); e6 fills."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# Same dual build as `languagetool`/`nextcloud`: an inert host `rlib` for
# `cargo build --workspace` (the pure rspamd `/checkv2` verdict codec + its unit
# tests), a real component for `wasm32-wasip2`. The guest wit-bindgen bindings are
# `#[cfg(target_arch = "wasm32")]`-gated so the host build never sees the wasm-import
# extern blocks. serde_json (already vetted in-tree — NO new dep) is needed on BOTH
# targets: the guest parses the rspamd response, and the host unit tests parse it too.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde_json = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wit-bindgen = { workspace = true }

[dev-dependencies]
mw-plugin = { path = "../../crates/mw-plugin" }
tokio = { workspace = true }
async-trait = { workspace = true }
