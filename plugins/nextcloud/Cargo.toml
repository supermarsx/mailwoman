[package]
name = "nextcloud-plugin"
description = "Nextcloud plugin: large-attachment share links via OCS/WebDAV over the host http-fetch — a first-party WASM engine hook for Mailwoman V7 (plan §3 e13/§8, SPEC §18.4)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# t7-e13 (the engine-hook half; the web attach/save/share UI is e7's, done): a thin
# `message-pipeline` (message-out) component (§18.4). Given a share request
# (`base_url` + WebDAV `path`, optional password/expiry) it POSTs the Nextcloud OCS
# `files_sharing` create-share API via the host `http-fetch` — host-mediated, under a
# NET ALLOWLIST — and returns the public share URL. The host's fetcher (e14, mw-server
# reqwest/rustls) injects the linked account's auth for the allowlisted host, so the
# guest never handles credentials. NO new dep (serde_json for the OCS JSON only).
#
# Same dual build as `languagetool` (see that crate for the rationale): an inert host
# `rlib` for `cargo build --workspace`, a real component for `wasm32-wasip2`.
[lib]
crate-type = ["cdylib", "rlib"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
wit-bindgen = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
mw-plugin = { path = "../../crates/mw-plugin" }
tokio = { workspace = true }
async-trait = { workspace = true }
