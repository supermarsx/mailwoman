[package]
name = "bridge-gmail"
description = "Gmail API account-backend bridge — a first-party WASM engine plugin for Mailwoman V7 (plan §3 e12, SPEC §6.5). FIRST scope-cut candidate (§27 ladder)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# t7-e12: the Gmail API bridge — true label semantics (Gmail labels ↔ the engine's
# mailbox/flag model), history-ID delta sync (via `SyncCursor::Plugin`), per-user
# OAuth client. Builds to `wasm32-wasip2` as a real component (see `build.sh`); the
# resulting bytes are committed at `fixtures/bridge-gmail.wasm` so `cargo test`
# loads it through `mw-plugin` without a wasm toolchain.
#
# Dual-target: `cdylib` is the component artifact the `wasm32-wasip2` build
# produces; `rlib` lets the host build (`cargo build --workspace`) + the integration
# test link the pure Gmail logic. All the `wit-bindgen`/component glue is gated to
# `#[cfg(target_family = "wasm")]`, so the host target compiles only the pure,
# transport-generic backend (unit-testable without wasm).
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Guest-side plugin ABI bindings (only linked on the wasm target — the macro is
# invoked inside the `#[cfg(target_family = "wasm")]` module). Apache-2.0 WITH
# LLVM-exception (already allowed in deny.toml).
wit-bindgen = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }

[dev-dependencies]
# Host-only: the integration test loads the committed component through the real
# `mw-plugin` jail and drives it as an `mw_engine::AccountBackend`, replaying the
# recorded Gmail fixtures via a mock `HttpFetcher` + `OAuthTokenProvider`.
mw-plugin = { workspace = true }
mw-engine = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
serde_json = { workspace = true }
