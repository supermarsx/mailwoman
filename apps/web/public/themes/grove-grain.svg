<?xml version="1.0" encoding="UTF-8"?>
<!-- Grove wood-grain texture (plan §3 e4). Directional streaks (low X / high Y
     frequency) evoke sawn timber; ~5% alpha. Tileable via stitchTiles. Gated off
     under reduced-transparency / HC / data-saver by themes.css.ts. -->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.014 0.42" numOctaves="3" seed="5" stitchTiles="stitch" result="n"/>
    <feColorMatrix in="n" type="matrix"
      values="0 0 0 0 0.30
              0 0 0 0 0.22
              0 0 0 0 0.13
              0 0 0 0.5 0"/>
  </filter>
  <rect width="240" height="240" filter="url(#grain)"/>
</svg>
