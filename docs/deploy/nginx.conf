# nginx reverse-proxy snippet for Mailwoman.
# TLS terminates here; Mailwoman runs on 127.0.0.1:8080 with MW_COOKIE_SECURE=true.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mail.example.org;

    ssl_certificate     /etc/letsencrypt/live/mail.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.example.org/privkey.pem;

    # Message bodies can be large; allow generous uploads for attachments.
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (JMAP push / EventSource lands here in later
        # milestones; harmless to forward now).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_upgrade;

        proxy_read_timeout 300s;
    }

    # Redirect plain HTTP to HTTPS.
}

server {
    listen 80;
    listen [::]:80;
    server_name mail.example.org;
    return 301 https://$host$request_uri;
}

# --- Sub-path deployment (e.g. https://host/mail/) --------------------------
# Mailwoman's SPA and same-origin proxy assume it is served at the site root.
# Serving under a sub-path requires a matching <base href> / asset-base build of
# the SPA (not wired in V0). If you must, strip the prefix before proxying:
#
#   location /mail/ {
#       rewrite ^/mail/(.*)$ /$1 break;
#       proxy_pass http://127.0.0.1:8080;
#       # ...same proxy_set_header block as above...
#   }
#
# and rebuild the web app with the corresponding base path. Root-path hosting
# is the supported V0 layout.
