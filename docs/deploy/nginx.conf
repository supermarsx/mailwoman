# nginx reverse-proxy snippet for Mailwoman.
# TLS terminates here; Mailwoman runs on 127.0.0.1:8080 with MW_COOKIE_SECURE=true.
#
# V2 adds realtime push: WebSocket JMAP at /jmap/ws (RFC 8887) and an
# EventSource (SSE) fallback at /jmap/eventsource. Both are same-origin and
# cookie-authenticated, so `connect-src 'self'` covers them — but the proxy MUST
# forward the WebSocket upgrade and MUST NOT buffer the SSE stream. See the
# per-location blocks below and docs/deploy/websocket.md.

# Map the Connection header so WebSocket upgrades pass through while ordinary
# requests keep keepalive. MUST live at http{} scope (put it in nginx.conf, not
# inside a server{} block).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mail.example.org;

    ssl_certificate     /etc/letsencrypt/live/mail.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.example.org/privkey.pem;

    # Message bodies can be large; allow generous uploads for attachments.
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
    }

    # WebSocket JMAP push (RFC 8887). Forward the upgrade; long idle timeout so
    # the 30 s server heartbeat keeps the socket open across quiet periods.
    location /jmap/ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # EventSource (SSE) fallback. Buffering OFF or events arrive in batches; no
    # upgrade, just a long-lived streaming response.
    location /jmap/eventsource {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Redirect plain HTTP to HTTPS.
}

server {
    listen 80;
    listen [::]:80;
    server_name mail.example.org;
    return 301 https://$host$request_uri;
}

# --- Sub-path deployment (e.g. https://host/mail/) --------------------------
# Mailwoman's SPA and same-origin proxy assume it is served at the site root.
# Serving under a sub-path requires a matching <base href> / asset-base build of
# the SPA (not wired in V0). If you must, strip the prefix before proxying:
#
#   location /mail/ {
#       rewrite ^/mail/(.*)$ /$1 break;
#       proxy_pass http://127.0.0.1:8080;
#       # ...same proxy_set_header block as above...
#   }
#
# and rebuild the web app with the corresponding base path. Root-path hosting
# is the supported V0 layout.
