# Mailwoman CI/dev drop-in for the official dovecot/dovecot image — the
# production-FIDELITY conformance target (plan §3 e7). Greenmail is the
# deterministic green gate; Dovecot is the `continue-on-error` fidelity leg.
#
# Included LAST via the stock config's `!include_try conf.d/*.conf`, so it
# overrides the image defaults without discarding its rootless login-user /
# service wiring. It turns the box into a minimal plaintext IMAP+POP3 host that
# authenticates the seeded testuser/testpass account.
#
# A file-based passdb+userdb (not the image's static USER_PASSWORD passdb) is
# used so `doveadm save` can resolve the user in-process during the pre-boot
# seed step, without a running auth service (see seed-and-serve.sh).
#
# CI/DEV ONLY. Cleartext auth + no TLS: never expose this on an untrusted
# network.

protocols = imap pop3

# 2.4 renamed disable_plaintext_auth -> auth_allow_cleartext; turn TLS off so the
# plaintext 143/110 listeners work without provisioning certs.
auth_allow_cleartext = yes
ssl = no

# File-based auth: one test account, plaintext secret (CI only). Defined here so
# the pre-boot seed (doveadm save) can look the user up from the file directly.
passdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}
userdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}

# The image's service blocks declare no inet_listener, which clears the built-in
# imap:143 / pop3:110 defaults — so re-declare the plaintext listeners here and
# disable the TLS ones (port 0).
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 0
  }
}
