# Mailwoman CI/dev drop-in enabling ManageSieve (RFC 5804) on the official
# dovecot/dovecot image, which bundles Pigeonhole (plan §3 e11, risk #9).
#
# This is the `continue-on-error` conformance leg for mw-sieve's ManageSieve
# CLIENT: Greenmail has no ManageSieve, so it stays the always-green gate, and
# engine-side rule execution is the always-green path (e9). Here we stand up a
# real Pigeonhole so scripts/managesieve/conformance.sh can drive the live
# PUTSCRIPT/LISTSCRIPTS/SETACTIVE/GETSCRIPT/DELETESCRIPT path our client targets
# — and Pigeonhole COMPILES the uploaded Sieve, checking generated-Sieve fidelity.
#
# Included LAST via the stock config's `!include_try conf.d/*.conf`, overriding
# image defaults without discarding its rootless login-user / service wiring.
# Mirrors scripts/dovecot/zz-mailwoman.conf (same passwd-file account).
#
# CI/DEV ONLY. Cleartext auth + no TLS: never expose on an untrusted network.

# `sieve` is the ManageSieve protocol; `imap` kept for parity with the other leg.
protocols = imap sieve

# 2.4: disable_plaintext_auth -> auth_allow_cleartext. No TLS (no certs to
# provision) so the plaintext 143 / 4190 listeners work directly.
auth_allow_cleartext = yes
ssl = no

# File-based auth: one test account, plaintext secret (CI only). Same file as the
# IMAP/POP3 dovecot leg — testuser/testpass, home under /srv/vmail (Sieve scripts
# land in the user's home).
passdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}
userdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}

# The image's service blocks declare no inet_listener, clearing the built-in
# defaults — re-declare the plaintext IMAP listener and disable its TLS twin.
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

# ManageSieve listens on 4190 (RFC 5804). Re-declare it explicitly so it is up
# regardless of image defaults.
service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}
