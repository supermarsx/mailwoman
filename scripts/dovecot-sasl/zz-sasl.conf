# Mailwoman t12 (26.12) SASL/SORT/THREAD conformance target — a dedicated Dovecot
# drop-in that ADVERTISES SCRAM-SHA-256 so the backend live-E2E gate (t12_sasl /
# t12_pop3_sasl) proves mw-imap/mw-pop3's SCRAM client state machine against a REAL
# server, and drives IMAP SORT + THREAD (RFC 5256, built into Dovecot) over a seeded
# mailbox. Separate from the V1 fidelity `dovecot` service so it never disturbs the
# plaintext-login conformance leg.
#
# Included LAST via the stock image's `!include_try conf.d/*.conf`.
#
# CI/DEV ONLY. Cleartext transport + no TLS: never expose on an untrusted network.
# SCRAM keeps the PASSWORD off the wire even without TLS (that is the point of the
# test); channel-binding (-PLUS) needs TLS and is exercised separately.

protocols = imap pop3

# 2.4: cleartext transport allowed (no TLS provisioned); SCRAM still protects the
# secret. Only SCRAM-SHA-256 is offered to the login listeners, so a successful
# IMAP/POP3 login PROVES the SCRAM exchange round-tripped (no silent PLAIN
# fallback). `login`/`plain` are intentionally omitted from the advertised set.
auth_allow_cleartext = yes
ssl = no
auth_mechanisms = scram-sha-256

# File-based passdb/userdb with a {PLAIN} secret: Dovecot derives the SCRAM
# SaltedPassword (salt + iterations in its server-first) from the cleartext at auth
# time, so the same testuser/testpass account authenticates over SCRAM-SHA-256.
passdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}
userdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 0
  }
}
