# Mailwoman t13 (26.13) live-E2E conformance target — a CB-capable Dovecot that
# proves THREE 26.13 wire claims against a REAL server:
#   1. SCRAM-SHA-256-PLUS channel binding (tls-server-end-point) over real TLS.
#   2. IMAP ACL (RFC 4314): GETACL/SETACL/DELETEACL/LISTRIGHTS/MYRIGHTS.
#   3. IMAP METADATA (RFC 5464): GET/SETMETADATA, server- and mailbox-level.
#
# Included LAST via the stock image's `!include_try conf.d/*.conf`.
# CI/DEV ONLY. Self-signed localhost cert; never expose on an untrusted network.

protocols = imap pop3

# TLS is provisioned (channel binding requires it). Cleartext auth is ALSO allowed
# so the plaintext 143/110 listeners can drive ACL/METADATA/ingest without TLS,
# while the imaps/pop3s listeners exercise SCRAM-SHA-256-PLUS over the TLS channel.
auth_allow_cleartext = yes
ssl = yes
ssl_server_cert_file = /certs/server.crt
ssl_server_key_file = /certs/server.key

# Offer SCRAM-SHA-256 and its channel-bound -PLUS variant. On a TLS connection
# Dovecot advertises SCRAM-SHA-256-PLUS (tls-server-end-point); a successful
# -PLUS login PROVES the client bound the exchange to the real cert.
auth_mechanisms = scram-sha-256 scram-sha-256-plus
auth_verbose = yes

# File-based passdb/userdb with a {PLAIN} secret; Dovecot derives the SCRAM
# SaltedPassword from the cleartext at auth time (same testuser/testpass account).
passdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}
userdb passwd-file {
  passwd_file_path = /etc/dovecot/mailwoman-users
}

# ── ACL (RFC 4314) + METADATA (RFC 5464) ────────────────────────────────────────
# The `acl` mail plugin enforces per-mailbox rights; `imap_acl` (loaded inside the
# imap protocol block) adds the IMAP GETACL/SETACL/DELETEACL/LISTRIGHTS/MYRIGHTS
# commands. vfile stores ACLs in a per-mailbox `dovecot-acl` file; the mailbox
# owner (testuser) holds all rights — including `a` (admin) — implicitly, so it can
# SETACL/DELETEACL on its own mailboxes.
mail_plugins {
  acl = yes
}
acl_driver = vfile

# METADATA: store per-mailbox + server-level annotations in a file dict, and enable
# the IMAP METADATA commands (GET/SETMETADATA) inside the imap protocol block.
protocol imap {
  mail_plugins {
    imap_acl = yes
  }
  imap_metadata = yes
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}
