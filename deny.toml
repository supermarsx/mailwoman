# cargo-deny policy — finalized for V2 (release 26.3), extended for V3 (26.4).
# The full dependency tree is vetted here: the V2 crates (mw-search, mw-sieve,
# mw-export) + deps (tantivy MIT, tokio-rustls-acme/rustls-acme MIT/Apache,
# tokio-tungstenite MIT, futures-util MIT/Apache) and the V3 crates (mw-ics,
# mw-dav, mw-carddav) + their new third-party deps all land under the permissive
# allow-list below. The license floor is permissive-only — GPL/LGPL/AGPL are
# denied by OMISSION from `[licenses].allow` (an unlisted license fails the
# check), so no copyleft can enter the tree (SPEC §3). `cargo deny check`
# (advisories + bans + licenses + sources) is green across the workspace.
#   NB: pdfjs-dist (Apache-2.0) is a WEB dep — gated by the JS `js-licenses`
#   job, not cargo-deny.
#
# V3 (26.4) new dependencies — all confirmed MIT OR Apache-2.0 (plan §1.2/§1.10):
#   icalendar, vcard4, rrule, chrono-tz (all MIT/Apache-2.0), quick-xml (MIT).
#   They are covered by the existing MIT/Apache-2.0 allow entries below.
#
# V4 (26.5) new dependencies — all confirmed MIT OR Apache-2.0 / BSD / ISC (plan
# §1.11), covered by the permissive allow-list below:
#   pgp (rPGP), cms, x509-cert, rsa, p256, ml-kem, mail-auth, sha2, sha1
#   (Apache-2.0/MIT), zeroize (Apache-2.0/MIT), maxminddb (ISC, optional geo),
#   wasm-bindgen / js-sys / web-sys / getrandom (Apache-2.0/MIT).
#   NOTE: ml-kem is UNAUDITED (plan §6#8) — scoped to store-key wrapping, not a
#   user-facing claim; recorded here, not a license issue.
#   Most of these are PRE-DECLARED in `[workspace.dependencies]` for e1/e6 and are
#   not yet linked into the tree (so not yet in Cargo.lock / this check); the e0
#   `mw-crypto` stub links only serde/zeroize + (on wasm) wasm-bindgen. When e1
#   wires rPGP/RustCrypto/ml-kem they land under the allow-list below unchanged.
# VET-BEFORE-ENABLE: `aws-lc-rs` (only if TLS-hybrid X25519MLKEM768 is enabled,
#   plan §1.7/§1.11) — Apache-2.0 / ISC + OpenSSL-licensed C components. NOT a V4
#   gate; left OUT of the build until its license floor is vetted. If enabled, its
#   OpenSSL-derived license needs an explicit allow decision recorded here first.
#
# V5 (26.6.0) new dependencies — the Tauri v2 thin-shell stack (plan §1.5/§1.10),
# all confirmed permissive (MIT OR Apache-2.0), pulled in by the new shell crates
# `apps/desktop/src-tauri` + `apps/mobile/src-tauri`:
#   tauri, tauri-build, tauri-plugin-{notification,os,deep-link,biometric,process,
#   shell,updater} (MIT/Apache-2.0), keyring (MIT/Apache-2.0). These land under the
#   MIT/Apache allow entries below. The server push relay (e5) uses `web-push-native`
#   (leotaku/web-push-native, MIT OR Apache-2.0; VAPID + RFC 8188/http-ece over pure
#   RustCrypto). NB: the originally-planned `web-push` 0.10 crate was DROPPED — it
#   transitively pulls `ece` → `openssl` (a `-sys` C build BANNED in `[bans]` below
#   that also does not build on the Windows/MSVC host); `web-push-native` is the
#   pure-Rust replacement (no openssl/boring C) and is now linked in the tree
#   (Cargo.lock) under the MIT/Apache allow entries — `cargo deny check` is green.
#   NEW allow entry required: the large Tauri dep tree transitively pulls
#   `tiny-keccak` (via `tauri-plugin-deep-link`), licensed CC0-1.0 — a Creative
#   Commons public-domain dedication (permissive, NOT copyleft). Added to the
#   allow-list below. No GPL/LGPL/AGPL enters the tree (verified 2026-07-13).
#
# V6 (26.7.0) new dependencies (plan §5) — Zero-Access · Admin Panel ·
# API-Keys/OAuth 2.1 · MCP · pluggable Postgres · Redis/Valkey cache. ALL confirmed
# permissive (MIT OR Apache-2.0 / BSD / ISC), pure-Rust + rustls throughout, NO
# GPL/LGPL/AGPL, NO openssl/-sys C TLS. Covered by the MIT/Apache allow entries
# below. Same posture as the V4/V5 pre-declares: most are PRE-DECLARED in the root
# `[workspace.dependencies]` and are NOT YET LINKED by the e0 scaffold (the four
# new stub crates mw-cache/mw-admin/mw-mcp/mw-oauth link only serde/thiserror/
# chrono), so they are not yet in Cargo.lock / this check. Each is wired by its
# owning Batch-B executor and lands under the allow-list unchanged:
#   sqlx `postgres` + `tls-rustls` FEATURES (mw-store, e1) — pure-Rust + rustls;
#     the `tls-rustls` feature keeps openssl OUT of the Postgres backend.
#   fred (MIT) — Redis/Valkey client, rustls TLS (mw-cache, e2).
#   moka (MIT/Apache-2.0) — in-process cache (mw-cache, e2).
#   argon2 (MIT/Apache-2.0) — Argon2id key/password hashing (mw-oauth/mw-admin).
#   rmcp (MIT) — official MCP Rust SDK (mw-mcp, e4); hand-rolled JSON-RPC fallback
#     if maturity slips (plan §6 R3).
#   hmac (MIT/Apache-2.0) — webhook HMAC-SHA256 (mw-server, e9; pairs with sha2).
#   opentelemetry / opentelemetry-otlp / tracing-opentelemetry (MIT/Apache-2.0) —
#     OTLP traces+metrics; tonic-rustls transport (e9 verifies no openssl at wire
#     time — if the OTLP tree pulls openssl transitively, e9 selects the rustls
#     feature or defers, never breaking the floor).
#   metrics / metrics-exporter-prometheus (MIT/Apache-2.0) — Prometheus /metrics.
# VET-BEFORE-ENABLE (declared intent, NOT enabled/linked by e0; each gated on the
# noted precondition + a clean rustls/no-openssl tree, decision recorded here when
# enabled):
#   jsonwebtoken (MIT, ring-backed) — only if OAuth resource-indicator interop
#     needs JWTs (default = opaque hashed tokens; likely unused).
#   totp-rs (MIT) — admin TOTP 2FA (admin passkey-only is the default; may defer V7).
#   sentry (MIT/Apache-2.0) — §21.2 error reporting, OFF by default; OTLP +
#     Prometheus are the committed observability paths. Enable only after vetting
#     its transitive tree for a rustls transport with no openssl (plan §6 R6).
# CI SERVICES (activated by e12 in docker-compose.ci.yml, network-only — mere
# aggregation, same posture as Dovecot/Radicale below; OUT of cargo-deny scope by
# design):
#   postgres:16 (PostgreSQL License — permissive) — the store-dual-backend +
#     migrate-store-smoke jobs + live E2E. valkey/valkey:8 (BSD-3-Clause) — the
#     cache-valkey job; chosen over redis:7.4+ (RSALv2/SSPL, source-available NOT
#     permissive) to keep the DEPLOYMENT story license-clean. `fred` speaks the
#     same protocol to either. These are separate networked programs, never linked
#     into or shipped with any crate/binary (network use, not a derivative work) —
#     excluded from cargo-deny + JS-license scope, exactly like Dovecot/Radicale.
# V6 FINALIZE (e12, verified 2026-07-14): the V6 dependency tree is now LINKED in
# Cargo.lock (sqlx `postgres`+`tls-rustls`, fred, moka, argon2, hmac 0.13,
# opentelemetry/opentelemetry-otlp/tracing-opentelemetry, metrics/
# metrics-exporter-prometheus). `cargo deny check` (advisories + bans + licenses +
# sources) is GREEN with NO new entries: no new `[licenses].allow` was required
# (all land under the permissive list) and NO new advisory ignore was needed — the
# fred/opentelemetry trees surfaced zero `vulnerability`- AND zero new
# `unmaintained`-class advisories at link time. `rmcp` was NOT linked (e4
# hand-rolled the MCP JSON-RPC/Streamable-HTTP over the in-tree axum, plan §6 R3),
# so its tree contributes nothing to vet. NO `openssl`/`-sys` C TLS enters the
# tree (the `[bans]` `openssl` deny still holds); the license floor is unchanged.
#
# Radicale (the CalDAV/CardDAV CI server, plan §1.5) is GPLv3 but is NOT a
# Mailwoman dependency: it is a separate program invoked over the network in CI
# only (docker-compose service, same posture as Dovecot/Greenmail in V1) — never
# linked into, imported by, or shipped with any crate/binary (mere aggregation /
# network use, not a derivative work). It is therefore OUT of `cargo deny` and
# the JS-license scope by design; the actual-dependency floor stays MIT/Apache/
# BSD/ISC/Zlib/MPL-2.0.

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack" RSA timing side-channel in the pure-Rust
    # `rsa` crate (pulled by RustCrypto `cms` for S/MIME, plan §1.11). There is NO
    # fixed version — the constant-time gap is unresolved upstream and the same
    # class of bug historically affected OpenSSL. Accepted here with a bounded
    # threat model: Mailwoman performs S/MIME RSA *decryption* CLIENT-SIDE in the
    # browser WASM crypto worker (plan §1.2), i.e. local use on the user's own
    # device — precisely the scenario the advisory itself blesses ("local use on a
    # non-compromised computer is fine"); there is no network-reachable server-side
    # timing oracle. Revisit and remove this ignore when `rsa` ships a constant-time
    # decrypt. (SPEC §8.2; plan §6 risk.)
    "RUSTSEC-2023-0071",

    # ── V5 (26.6.0): Tauri v2 transitive UNMAINTAINED advisories (plan §1.5/§1.10).
    # These are all `unmaintained` maintenance-status advisories (NOT
    # vulnerabilities — `cargo deny check advisories` reports zero `vulnerability`
    # entries), carried by EVERY Tauri v2 app through its dependency tree. There is
    # no fixed version to move to: the upstream ecosystem has not migrated, so the
    # only alternative to ignoring them is dropping the desktop/mobile shells
    # entirely. Bounded + documented, same posture as RUSTSEC-2023-0071 above.
    #
    #   gtk-rs GTK3 bindings (gtk/gdk/atk/glib/… v0.18) — Tauri's LINUX WebKitGTK
    #   webview backend. No longer maintained upstream (GTK3 → GTK4 migration
    #   pending across the ecosystem). Linux-only; irrelevant to the Windows/macOS
    #   (WebView2/WKWebView) and Android/iOS backends. Revisit when Tauri adopts GTK4.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    #   proc-macro-error v1 — unmaintained proc-macro helper pulled transitively by
    #   the GTK3 macro crates. Build-time only, no runtime surface.
    "RUSTSEC-2024-0370",
    #   unic-* v0.9 (unicode property tables) — unmaintained, pulled transitively by
    #   the Tauri config/codegen tree. Data-table crates, no known defect.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    # Public-domain dedication (Creative Commons Zero) of `tiny-keccak`, surfaced
    # transitively by the V5 Tauri shell tree (`tauri-plugin-deep-link`).
    # Permissive / public-domain — no copyleft (plan §1.10).
    "CC0-1.0",
    # Permissive BSD-style license of the `bzip2` C library, surfaced by a
    # transitive dep of the V4 crypto tree. Free/permissive — no copyleft.
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
deny = [
    { crate = "openssl", reason = "rustls only (SPEC §5.1)" },
    { crate = "sequoia-openpgp", reason = "LGPL — incompatible with MIT-only policy (SPEC §3)" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
