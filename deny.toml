[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
deny = [
    { crate = "openssl", reason = "rustls only (SPEC §5.1)" },
    { crate = "sequoia-openpgp", reason = "LGPL — incompatible with MIT-only policy (SPEC §3)" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
