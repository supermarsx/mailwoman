apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mailwoman.fullname" . }}
  labels:
    {{- include "mailwoman.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # SQLite at /data on a ReadWriteOnce volume => one writer. Recreate on update.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "mailwoman.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mailwoman.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "mailwoman.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mailwoman
          image: {{ include "mailwoman.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.serverKeySecret.name }}
            - name: MW_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.serverKeySecret.name | quote }}
                  key: {{ .Values.serverKeySecret.key | quote }}
            {{- end }}
          livenessProbe:
            exec:
              command: ["/usr/local/bin/mailwoman", "healthcheck"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/usr/local/bin/mailwoman", "healthcheck"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            # Root fs is read-only; the render worker + rustls need a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.tmpSizeLimit }}
        - name: data
        {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "mailwoman.fullname" .)) }}
        {{- else }}
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
