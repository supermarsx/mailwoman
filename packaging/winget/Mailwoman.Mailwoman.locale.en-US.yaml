ShortDescription: Web-first mail, calendar, tasks and contacts — thin native shell.
Description: >-
  Mailwoman is a web-first mail, calendar, tasks and contacts client. The Windows app
  is a thin native shell (Tauri v2) around the same web app the server serves, adding
  OS integration (native notifications, Credential Manager keychain, default mailto
  handler, share targets, badge counts, Windows Hello app-lock) and an optional
  self-contained local server. No protocol logic lives in the shell.
