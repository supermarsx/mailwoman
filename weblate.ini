# wlc (Weblate CLI) configuration for the Mailwoman translation project.
#
# Used by the `wlc` client and CI to push/pull translations. The API key is NOT
# committed — supply it via the `WLC_API_KEY` environment variable or an operator
# `~/.config/weblate` file. Component-level config-as-code lives in `.weblate/`.
#
# Source language is `en`; the 12 gate locales (de fr es pt-BR nl it pl ru uk zh
# ja) are the translation targets. Catalog format is Fluent (`.ftl`).

[weblate]
# Point this at the Weblate instance that hosts the project (self-hosted or
# hosted.weblate.org). Operator-configured; placeholder shown.
url = https://hosted.weblate.org/api/
# Default project/component the CLI acts on when none is given on the command line.
translation = mailwoman/common

[keys]
# API token is read from $WLC_API_KEY at runtime — never stored here.
