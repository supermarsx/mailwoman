<?xml version="1.0" encoding="UTF-8"?>
<!-- Grove paper texture (plan §3 e4). Tileable warm fibrous grain, ~4% alpha so
     body text stays legible. Gated off under reduced-transparency / HC / data-saver
     by themes.css.ts. Pure feTurbulence — no raster payload, a few hundred bytes. -->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <filter id="paper" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11" stitchTiles="stitch" result="n"/>
    <feColorMatrix in="n" type="matrix"
      values="0 0 0 0 0.42
              0 0 0 0 0.34
              0 0 0 0 0.22
              0 0 0 0.45 0"/>
  </filter>
  <rect width="240" height="240" filter="url(#paper)"/>
</svg>
