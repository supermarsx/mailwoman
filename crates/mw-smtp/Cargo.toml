[package]
name = "mw-smtp"
description = "MVP SMTP submission client for Mailwoman (465/587, SASL, tokio/rustls)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# Deliberately decoupled from mw-mime: this crate accepts already-serialized
# raw MIME bytes (plan §3 e4 "PREFER: accept raw bytes"), so it depends on no
# other workspace crate and does not block on e1.
[dependencies]
tokio = { workspace = true }
tokio-rustls = { workspace = true }
rustls = { workspace = true }
rustls-pki-types = { workspace = true }
webpki-roots = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# SCRAM-SHA-256 SASL (RFC 5802/7677): SHA-256 + HMAC from the in-tree RustCrypto
# workspace deps; PBKDF2 is derived inline (single-block HMAC), so no `pbkdf2`
# crate is added. Not new workspace deps — already declared/resolved in-tree.
sha2 = { workspace = true }
hmac = { workspace = true }
# SCRAM-SHA-256-PLUS channel binding (RFC 5929 `tls-server-end-point`): parse the
# leaf cert's signature algorithm to pick the digest (SHA-256/384/512, SHA-256
# floor). Pure-Rust RustCrypto, already an in-tree workspace dep (S/MIME stack);
# newly LINKED here — FLAG for Cargo.lock reconcile (mw-smtp gains x509-cert +
# its der/spki/const-oid ASN.1 deps, all already resolved in the lock).
x509-cert = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
