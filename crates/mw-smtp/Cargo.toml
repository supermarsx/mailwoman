[package]
name = "mw-smtp"
description = "MVP SMTP submission client for Mailwoman (465/587, SASL, tokio/rustls)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# Deliberately decoupled from mw-mime: this crate accepts already-serialized
# raw MIME bytes (plan §3 e4 "PREFER: accept raw bytes"), so it depends on no
# other workspace crate and does not block on e1.
[dependencies]
tokio = { workspace = true }
tokio-rustls = { workspace = true }
rustls = { workspace = true }
rustls-pki-types = { workspace = true }
webpki-roots = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
