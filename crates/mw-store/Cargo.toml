[package]
name = "mw-store"
description = "Local store for Mailwoman: sessions + settings, encrypted at rest (sqlx/SQLite)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# V6 (t6-e1): enable the Postgres backend + pure-Rust rustls TLS ON TOP of the
# workspace SQLite defaults. `tls-rustls` resolves to `tls-rustls-ring-webpki`
# (ring + webpki-roots) — pure Rust, NO openssl / native-tls / aws-lc C code.
# SQLite stays the default backend (chosen by DSN in `Store::open`); these only
# add the Postgres code path. Features unify across the workspace but the default
# runtime backend is unchanged.
sqlx = { workspace = true, features = ["postgres", "tls-rustls"] }
chacha20poly1305 = { workspace = true }
rand = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
# The dual-backend parity + migrate-store integration tests open a raw Postgres
# pool (to TRUNCATE between runs and read ciphertext columns directly) when
# `DATABASE_URL_PG`/`MW_TEST_PG` is set; they run SQLite-only otherwise.
sqlx = { workspace = true, features = ["postgres", "tls-rustls"] }
