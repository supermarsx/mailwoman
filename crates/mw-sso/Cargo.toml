[package]
name = "mw-sso"
description = "OIDC + SAML 2.0 SSO login backends (pure protocol + crypto, no axum) for Mailwoman 26.9 (t9 plan §2/§3, SPEC §18.3)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

# t9-e0 SCAFFOLD. This crate freezes the §3 SSO contract (types + the `SsoLogin`
# trait) as compiling stubs so e1 (OIDC) and e2 (SAML) implement, and e3 (server
# mount) / e4 (web-admin) consume, in parallel. `oidc.rs`/`saml.rs` are stubs whose
# `SsoLogin` methods `unimplemented!()`; `state.rs` is the real PendingState store.
#
# DEP VET (e0 deliverable — crate-local pins like mw-directory's ldap3 0.12; the
# coordinator reconciles these into root `[workspace.dependencies]`):
#   * openidconnect 4 — OIDC discovery + auth-code+PKCE + JWKS ID-token validation.
#     JWS verification is RustCrypto (rsa/p256/p384/hmac/sha2) — NO openssl.
#     `default-features=false` DROPS the crate's native-tls/curl/ureq clients; the
#     `reqwest` + `rustls-tls` features wire the in-tree rustls reqwest async client
#     (reqwest 0.12, feature-unified with the workspace). VET: adds no openssl / no
#     `-sys` C to the tree (see .orchestration/logs/t9-e0.md).
#   * flate2 1 — pure-Rust DEFLATE for the SAML HTTP-Redirect binding.
#     `default-features=false, features=["rust_backend"]` pins the miniz_oxide
#     pure-Rust backend and keeps every zlib/zlib-ng/cloudflare `-sys` C backend OUT.
[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
rand = { workspace = true }
tracing = { workspace = true }
openidconnect = { version = "4", default-features = false, features = ["reqwest", "rustls-tls"] }
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }

# ── SAML hand-roll (t9-e2) — REUSED in-tree RustCrypto + quick-xml; NO new crate
# enters the workspace tree (mw-crypto already pulls every one of these). Pure-Rust,
# no openssl / no libxml. base64/quick-xml/sha2/rsa/p256/x509-cert are workspace
# pins; der/spki are the RustCrypto ASN.1 traits `x509-cert`/`rsa`/`p256` build on
# (crate-local pins at the same 0.8 line mw-crypto uses, so cargo unifies to one).
base64 = { workspace = true }
quick-xml = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
rsa = { workspace = true, features = ["sha2"] }
p256 = { workspace = true, features = ["ecdsa", "pem", "pkcs8"] }
x509-cert = { workspace = true, features = ["pem"] }
der = { version = "0.8", features = ["std", "alloc", "pem"] }
spki = { version = "0.8", features = ["alloc", "pem"] }
# RustCrypto signature traits (Verifier for RSA/ECDSA-SHA256 XML-DSig validation).
signature = "3"

[dev-dependencies]
# The SAML XML-DSig acceptance tests sign real fixtures with the RustCrypto signing
# keys (RSA-SHA256 over the exc-C14N form) to prove the validator end-to-end, and
# drive the async `SsoLogin` surface.
tokio = { workspace = true }
hex = { workspace = true }
