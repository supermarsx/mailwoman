# Standalone (own `[workspace]` table ⇒ excluded from the parent workspace, so
# `cargo build --workspace` never touches it and the root manifest needs no edit).
# Built ONCE to `wasm32-wasip2` and the resulting component committed under
# `crates/mw-plugin/tests/fixtures/pim-guest.wasm`; the host integration tests load
# that committed byte-for-byte so `cargo test -p mw-plugin` is green everywhere
# without a wasm toolchain. This guest targets `world plugin-pim` (the t10 second
# world) — it therefore ALSO satisfies `world plugin`, so the existing host loads it
# unchanged, and additionally exports `calendar`/`tasks`/`bridge-parity` which the
# host's per-interface probe (t10-e1) binds. See `build.sh` alongside.
[package]
name = "mw-plugin-pim-guest-fixture"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.46"

[profile.release]
opt-level = "s"
strip = true
lto = true
