[package]
name = "mw-mime-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
mw-mime = { path = ".." }

[[bin]]
name = "parse"
path = "fuzz_targets/parse.rs"
test = false
doc = false
bench = false

# Standalone workspace so the root workspace never pulls libfuzzer-sys into
# ordinary `cargo build`/`clippy` on stable (plan §4.3 fuzz DoD).
[workspace]
