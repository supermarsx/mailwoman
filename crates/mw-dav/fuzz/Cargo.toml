[package]
name = "mw-dav-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
mw-dav = { path = ".." }

[[bin]]
name = "dav_xml"
path = "fuzz_targets/dav_xml.rs"
test = false
doc = false
bench = false

# Standalone workspace so the root workspace never pulls libfuzzer-sys into
# ordinary `cargo build`/`clippy` on stable (plan §4.3 / §1.9 fuzz DoD).
[workspace]
