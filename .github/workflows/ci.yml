name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------------
  # Rust: format, lint, test, build. rust-embed compiles against the committed
  # apps/web/dist/.gitkeep placeholder, so no web build is needed here.
  # -------------------------------------------------------------------------
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: build
        run: cargo build --workspace

  # -------------------------------------------------------------------------
  # Supply chain: licenses + advisories + bans + sources (deny.toml).
  # -------------------------------------------------------------------------
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans sources

  # -------------------------------------------------------------------------
  # IMAP conformance matrix: the env-gated live tests (#[ignore]) run against a
  # REAL mail server booted from docker-compose.dev.yml.
  #   - greenmail leg = the DETERMINISTIC gate (required; IMAP4rev1 + POP3 +
  #     SMTP). Runs mw-imap + mw-pop3 + mw-smtp + mw-server(engine_live).
  #   - dovecot leg = the production-FIDELITY target (continue-on-error until
  #     stabilised, plan §6 risk #11). No SMTP submission, so it runs
  #     mw-imap + mw-pop3 + mw-server only (the mw-smtp live test hard-requires
  #     GREENMAIL_SMTP).
  # Login is testuser/testpass on both; the IMAP login name is the local part.
  # -------------------------------------------------------------------------
  imap-conformance:
    runs-on: ubuntu-latest
    needs: [rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: greenmail
            imap: "127.0.0.1:3143"
            pop3: "127.0.0.1:3110"
            smtp: "127.0.0.1:3025"
            crates: "-p mw-imap -p mw-pop3 -p mw-smtp -p mw-server"
            required: "true"
          - backend: dovecot
            imap: "127.0.0.1:2143"
            pop3: "127.0.0.1:2110"
            smtp: ""
            crates: "-p mw-imap -p mw-pop3 -p mw-server"
            required: "false"
    # Dovecot is the fidelity leg — informational, never fails the pipeline.
    continue-on-error: ${{ matrix.required == 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: boot ${{ matrix.backend }} (wait for healthy)
        run: docker compose -f docker-compose.dev.yml up -d --wait ${{ matrix.backend }}
      - name: assert IMAP login works (greenmail gate)
        if: matrix.backend == 'greenmail'
        env:
          GREENMAIL_USER: testuser
          GREENMAIL_PASS: testpass
        run: ./scripts/greenmail/wait-for-greenmail.sh 127.0.0.1 3143 60
      - name: live conformance tests (${{ matrix.backend }})
        env:
          GREENMAIL_IMAP: ${{ matrix.imap }}
          GREENMAIL_POP3: ${{ matrix.pop3 }}
          GREENMAIL_USER: testuser
          GREENMAIL_PASS: testpass
          GREENMAIL_TLS: plaintext
        run: |
          if [ -n "${{ matrix.smtp }}" ]; then
            export GREENMAIL_SMTP="${{ matrix.smtp }}"
          fi
          cargo test ${{ matrix.crates }} --test '*' -- --ignored
      - name: server logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color ${{ matrix.backend }}
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # Web: typecheck, lint, unit tests, build. The bundle-size gate is a dedicated
  # job (`bundle-size`) so it is a first-class, named §23 gate.
  # -------------------------------------------------------------------------
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install
        run: pnpm -C apps/web install --frozen-lockfile
      - name: typecheck
        run: pnpm -C apps/web typecheck
      - name: lint
        run: pnpm -C apps/web lint
      - name: test
        run: pnpm -C apps/web test
      - name: build
        run: pnpm -C apps/web build

  # -------------------------------------------------------------------------
  # JS licenses: allowlist over runtime deps. Non-blocking for now (the
  # authoritative supply-chain gate is cargo-deny); tighten once verified.
  # -------------------------------------------------------------------------
  js-licenses:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install
        run: pnpm -C apps/web install --frozen-lockfile
      - name: check licenses (runtime deps)
        run: >-
          pnpm -C apps/web dlx license-checker-rseidelsohn
          --production --summary
          --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Zlib;MPL-2.0;CC0-1.0;Unlicense;Python-2.0"

  # -------------------------------------------------------------------------
  # E2E: build the compose stack (mock backend), wait healthy, run Playwright.
  # The Playwright config + specs are authored by e8 at apps/web/e2e and
  # apps/web/playwright.config.ts, plus @playwright/test in devDependencies.
  # -------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps (includes Playwright once e8 lands)
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start stack (mock backend)
        run: docker compose -f docker-compose.dev.yml up -d --build mock mailwoman
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8080/healthz 240
      - name: run Playwright E2E (mock / proxy mode)
        run: pnpm -C apps/web exec playwright test --project=mock
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # V2 perf/security/conformance gates (plan §3 e11).
  # -------------------------------------------------------------------------

  # Search p95 < 50 ms over 100k (SPEC §23). The gate lives in the Rust test
  # `crates/mw-search/tests/bench.rs`, which asserts p95 < 50 ms; the wrapper
  # runs it in release and surfaces the measured p95 for the log/trend.
  search-bench:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: mw-search p95 gate (<50 ms over 100k)
        run: bash ./scripts/search-bench.sh

  # Bundle-size gate (SPEC §23): the login->inbox entry chunk must be < 250 KB
  # gzip and pdfjs must stay OFF the critical path (a lazy chunk). Both asserted
  # by apps/web/scripts/check-size.mjs (`pnpm run size`).
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install
        run: pnpm -C apps/web install --frozen-lockfile
      - name: build
        run: pnpm -C apps/web build
      - name: bundle-size gate (entry < 250 KB gzip; pdfjs lazy)
        run: pnpm -C apps/web run size

  # OWASP ZAP baseline scan against the running mock stack — the SPEC §27 V2 exit
  # gate. Flaky/slow, so continue-on-error; the HTML report is uploaded.
  zap-baseline:
    runs-on: ubuntu-latest
    needs: [rust, web]
    continue-on-error: true
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - name: build + start stack (mock backend)
        run: docker compose -f docker-compose.dev.yml up -d --build mock mailwoman
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8080/healthz 240
      - name: ZAP baseline scan
        # -I: warnings do not fail the scan (only FAIL-level rules do); -m 5:
        # cap the spider. The report is written to the mounted workspace.
        run: |
          docker run --network host -v "$PWD:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 -I -m 5 \
            -r zap-baseline-report.html
      - name: upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-baseline-report.html
          if-no-files-found: ignore
          retention-days: 7
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # ManageSieve (RFC 5804) conformance vs Dovecot-Pigeonhole — the LIVE path for
  # mw-sieve's ManageSieve CLIENT (plan §6 risk #9). Greenmail has no
  # ManageSieve, so it stays the always-green gate and engine-side rule
  # execution is the always-green path -> this leg is continue-on-error.
  managesieve-conformance:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: boot dovecot-pigeonhole (wait healthy)
        run: docker compose -f docker-compose.dev.yml up -d --wait dovecot-pigeonhole
      - name: ManageSieve conformance (PUTSCRIPT compiles generated Sieve)
        run: bash ./scripts/managesieve/conformance.sh 127.0.0.1 4190 60
      - name: server logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color dovecot-pigeonhole
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # V3 (PIM) CalDAV/CardDAV conformance vs Radicale (plan §3 e11). The env-gated
  # live tests (#[ignore]) in mw-dav / mw-carddav / mw-engine run against a REAL
  # CalDAV/CardDAV server booted from docker-compose.dev.yml:
  #   - mw-dav        — RFC 6764 discovery -> sync-collection (create/sync).
  #   - mw-carddav    — addressbook discovery -> query -> multiget projection.
  #   - mw-engine     — a full sync_pim round-trip: engine A PUTs an event to the
  #                     real collection, engine B (fresh store) pulls it back.
  # Radicale is the DETERMINISTIC green gate (required). Google/M365 quirk
  # fixtures are RECORDED XML exercised by the always-green `rust` job (not here),
  # so this job needs no live OAuth and stays deterministic. Radicale is CI infra
  # (a separate networked GPLv3 program, never linked/shipped — plan §1.5,
  # deny.toml), excluded from the dependency-license scope.
  # -------------------------------------------------------------------------
  caldav-carddav-conformance:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: boot radicale (wait healthy)
        run: docker compose -f docker-compose.dev.yml up -d --wait radicale
      - name: seed radicale collections (VEVENT + VTODO calendars + addressbook)
        run: sh ./scripts/radicale/seed.sh 127.0.0.1 5232 60
      - name: CalDAV/CardDAV live conformance (discovery / sync / round-trip / 412 conflict)
        env:
          RADICALE_URL: "http://127.0.0.1:5232"
          RADICALE_USER: testuser
          RADICALE_PASS: testpass
        run: cargo test -p mw-dav -p mw-carddav -p mw-engine -- --ignored
      - name: server logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color radicale
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # E2E (engine mode): the SAME web UI, but mw-server in MW_MODE=engine driving
  # a REAL IMAP/SMTP account (Greenmail) through mw-engine — the V1 exit gate
  # "engine mode drives a real IMAP account through the unmodified web UI".
  # Boots greenmail + mailwoman-engine (:8090) and runs the `engine` Playwright
  # project (imap-engine.spec.ts): login -> real IMAP mailbox -> compose+send
  # via SMTP -> the message arrives, is MIME-parsed, and renders in the
  # sandboxed reader. Sibling of the mock `e2e` job; both must stay green.
  # -------------------------------------------------------------------------
  e2e-engine:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start engine stack (greenmail + mw-server engine mode)
        run: docker compose -f docker-compose.dev.yml up -d --build --wait greenmail mailwoman-engine
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8090/healthz 240
      - name: run Playwright E2E (engine mode vs Greenmail)
        run: pnpm -C apps/web exec playwright test --project=engine
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color greenmail mailwoman-engine
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-engine
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # E2E (V3 PIM): the SAME engine-mode server (:8090) as `e2e-engine`, but the
  # `pim` Playwright project drives the four PIM modules (calendar / tasks /
  # notes / contacts) through the real UI — the plan §3 e12 / DoD live-E2E gate
  # "each module reachable from the nav + engine-backed, not just unit-green".
  # The modules run over the engine's auto-seeded Mailwoman-native collections
  # (a default calendar/task-list/notebook/address-book is seeded on first get),
  # so no CalDAV account is needed in the browser — the CalDAV/CardDAV round-trip
  # itself is the separate `caldav-carddav-conformance` (Rust) gate. Sibling of
  # the `e2e` / `e2e-engine` jobs; all three must stay green.
  # -------------------------------------------------------------------------
  e2e-pim:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start engine stack (greenmail + mw-server engine mode)
        run: docker compose -f docker-compose.dev.yml up -d --build --wait greenmail mailwoman-engine
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8090/healthz 240
      - name: run Playwright E2E (PIM modules vs engine)
        run: pnpm -C apps/web exec playwright test --project=pim
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color greenmail mailwoman-engine
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pim
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # ===========================================================================
  # V4 (Crypto & Security) CI jobs — plan §3 e9. Filled by e9 from the e0 stubs
  # once the wasm bundle + crypto/verdict fixtures landed (e1/e6/e8/e8b). Each is a
  # focused, named §27-V4 gate. The interop + verdict tests also run inside the
  # always-green `rust` job's `cargo test --workspace`; these surface them as
  # first-class signals, and `wasm-build` is the ONLY place the 2-OS wasm toolchain
  # is exercised end-to-end (the top V4 risk, §6#2).
  # ===========================================================================

  # wasm-build — the TOP V4 risk (§6#2 / §1.13): build mw-crypto AND mw-sanitize to
  # wasm32 via wasm-pack on BOTH Windows AND Linux (scripts/build-wasm.{sh,ps1},
  # which build both crates), then run a Node smoke that drives the freshly-built
  # bundle through generateKey → encrypt → decrypt and asserts the plaintext
  # round-trips. rPGP/RustCrypto are pure-Rust + wasm-tested; getrandom uses its JS
  # backend on wasm32 (selected by the build scripts). The smoke imports the
  # wasm-pack `--target web` glue directly (initSync + the frozen §2.3 exports) — no
  # pnpm/web build needed, so it stays a pure toolchain-portability gate.
  wasm-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install wasm-pack
        run: cargo install wasm-pack --locked
      - name: build wasm bundles (mw-crypto + mw-sanitize)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then pwsh scripts/build-wasm.ps1; else scripts/build-wasm.sh; fi
      - name: node wasm smoke (generateKey -> encrypt -> decrypt round-trip)
        shell: bash
        run: |
          node --input-type=module -e "import {readFileSync} from 'node:fs'; import {resolve} from 'node:path'; import {pathToFileURL} from 'node:url'; const dir=resolve(process.cwd(),'apps/web/src/wasm/mw-crypto'); const m=await import(pathToFileURL(resolve(dir,'mw_crypto.js')).href); m.initSync({module:readFileSync(resolve(dir,'mw_crypto_bg.wasm'))}); const P='mailwoman wasm smoke round-trip'; const k=m.generateKey({kind:'pgp',userId:'Smoke <smoke@example.com>',passphrase:'pw'}); const c=m.encrypt({kind:'pgp',plaintext:P,recipientPublicKeys:[k.publicKeyArmored]}); const o=m.decrypt({kind:'pgp',ciphertext:c.armoredCiphertext,encryptedPrivateBundle:k.encryptedPrivateBundle,passphrase:'pw'}); if(o.plaintextText!==P) throw new Error('wasm smoke round-trip mismatch: '+JSON.stringify(o.plaintextText)); console.log('ROUNDTRIP_OK');"

  # crypto-interop — decrypt/verify GnuPG- and openssl(Outlook-style)-GENERATED
  # recorded fixtures (fixtures/crypto/**, no live keyserver/DNS — §6#6 / §25). The
  # tests run in the default `native` feature: pgp.rs covers the GnuPG interop
  # vector (decrypt + verify a real `gpg`-produced message); smime.rs the openssl
  # CMS sign/verify + RSA+AES enveloped decrypt + PKCS#12 import.
  crypto-interop:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: PGP/S-MIME interop fixtures (recorded GnuPG/Thunderbird/Outlook)
        run: cargo test -p mw-crypto --test pgp --test smime

  # mail-auth-verdicts — DKIM verdicts against a seeded OFFLINE resolver (e6's
  # SeededTxtCache, RFC 8463 ed25519 vector — deterministic PASS and FAIL, never
  # touches the network, §6#7). The same lib-test path also proves the
  # Received-chain parse, attachment ext-vs-magic risk, and anomaly detection.
  mail-auth-verdicts:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: DKIM/verdict tests (seeded-DNS, pass AND fail)
        run: cargo test -p mw-engine --lib security::verdict

  # -------------------------------------------------------------------------
  # E2E (V4 crypto): the SAME engine-mode server (:8090) as e2e-engine/e2e-pim,
  # but the `crypto` Playwright project drives the V4 crypto/security UIs (key
  # management, Security panel, Compose encrypt + DLP, max-security switch)
  # through the real UI against the real engine + the real WASM crypto worker —
  # the plan §3 e10 / DoD live-E2E gate. The mailwoman-engine image builds the web
  # from source, so the committed apps/web/src/wasm bundles ship in the served app
  # (the worker + wasm stay lazy, off the login->inbox path). e10 authors
  # apps/web/e2e/crypto-*.spec.ts + the `crypto` project in playwright.config.ts
  # (testMatch crypto-*.spec.ts, baseURL the engine :8090); this job WIRES the
  # invocation. Sibling of e2e / e2e-engine / e2e-pim — all four must stay green.
  # -------------------------------------------------------------------------
  e2e-crypto:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start engine stack (greenmail + mw-server engine mode, incl. wasm + DLP rule)
        run: docker compose -f docker-compose.dev.yml -f docker-compose.crypto.yml up -d --build --wait greenmail mailwoman-engine
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8090/healthz 240
      - name: run Playwright E2E (V4 crypto/security vs engine + WASM worker)
        run: pnpm -C apps/web exec playwright test --project=crypto
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.crypto.yml logs --no-color greenmail mailwoman-engine
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-crypto
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.crypto.yml down -v
