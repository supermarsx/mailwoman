name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------------
  # Rust: format, lint, test, build. rust-embed compiles against the committed
  # apps/web/dist/.gitkeep placeholder, so no web build is needed here.
  # -------------------------------------------------------------------------
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The V5 Tauri shell crates (mailwoman-desktop / mailwoman-mobile) need the
      # Linux WebKitGTK system libraries to compile; they are built (Win + Linux)
      # in the dedicated `desktop-shell` job below (e8), NOT in this lean core job.
      # Nothing in the core workspace depends on them, so excluding them here is
      # clean. On Windows (WebView2 present) `cargo build --workspace` builds them
      # directly — see the e0 toolchain probe.
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --exclude mailwoman-desktop --exclude mailwoman-mobile --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace --exclude mailwoman-desktop --exclude mailwoman-mobile
      - name: build
        run: cargo build --workspace --exclude mailwoman-desktop --exclude mailwoman-mobile

  # -------------------------------------------------------------------------
  # Supply chain: licenses + advisories + bans + sources (deny.toml).
  # -------------------------------------------------------------------------
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans sources

  # -------------------------------------------------------------------------
  # IMAP conformance matrix: the env-gated live tests (#[ignore]) run against a
  # REAL mail server booted from docker-compose.dev.yml.
  #   - greenmail leg = the DETERMINISTIC gate (required; IMAP4rev1 + POP3 +
  #     SMTP). Runs mw-imap + mw-pop3 + mw-smtp + mw-server(engine_live).
  #   - dovecot leg = the production-FIDELITY target (continue-on-error until
  #     stabilised, plan §6 risk #11). No SMTP submission, so it runs
  #     mw-imap + mw-pop3 + mw-server only (the mw-smtp live test hard-requires
  #     GREENMAIL_SMTP).
  # Login is testuser/testpass on both; the IMAP login name is the local part.
  # -------------------------------------------------------------------------
  imap-conformance:
    runs-on: ubuntu-latest
    needs: [rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: greenmail
            imap: "127.0.0.1:3143"
            pop3: "127.0.0.1:3110"
            smtp: "127.0.0.1:3025"
            crates: "-p mw-imap -p mw-pop3 -p mw-smtp -p mw-server"
            required: "true"
          - backend: dovecot
            imap: "127.0.0.1:2143"
            pop3: "127.0.0.1:2110"
            smtp: ""
            crates: "-p mw-imap -p mw-pop3 -p mw-server"
            required: "false"
    # Dovecot is the fidelity leg — informational, never fails the pipeline.
    continue-on-error: ${{ matrix.required == 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: boot ${{ matrix.backend }} (wait for healthy)
        run: docker compose -f docker-compose.dev.yml up -d --wait ${{ matrix.backend }}
      - name: assert IMAP login works (greenmail gate)
        if: matrix.backend == 'greenmail'
        env:
          GREENMAIL_USER: testuser
          GREENMAIL_PASS: testpass
        run: ./scripts/greenmail/wait-for-greenmail.sh 127.0.0.1 3143 60
      - name: live conformance tests (${{ matrix.backend }})
        env:
          GREENMAIL_IMAP: ${{ matrix.imap }}
          GREENMAIL_POP3: ${{ matrix.pop3 }}
          GREENMAIL_USER: testuser
          GREENMAIL_PASS: testpass
          GREENMAIL_TLS: plaintext
        run: |
          if [ -n "${{ matrix.smtp }}" ]; then
            export GREENMAIL_SMTP="${{ matrix.smtp }}"
          fi
          cargo test ${{ matrix.crates }} --test '*' -- --ignored
      - name: server logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color ${{ matrix.backend }}
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # Web: typecheck, lint, unit tests, build. The bundle-size gate is a dedicated
  # job (`bundle-size`) so it is a first-class, named §23 gate.
  # -------------------------------------------------------------------------
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install
        run: pnpm -C apps/web install --frozen-lockfile
      - name: typecheck
        run: pnpm -C apps/web typecheck
      - name: lint
        run: pnpm -C apps/web lint
      - name: test
        run: pnpm -C apps/web test
      - name: build
        run: pnpm -C apps/web build

  # -------------------------------------------------------------------------
  # JS licenses: allowlist over runtime deps. Non-blocking for now (the
  # authoritative supply-chain gate is cargo-deny); tighten once verified.
  # -------------------------------------------------------------------------
  js-licenses:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install
        run: pnpm -C apps/web install --frozen-lockfile
      - name: check licenses (runtime deps)
        run: >-
          pnpm -C apps/web dlx license-checker-rseidelsohn
          --production --summary
          --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Zlib;MPL-2.0;CC0-1.0;Unlicense;Python-2.0"

  # -------------------------------------------------------------------------
  # E2E: build the compose stack (mock backend), wait healthy, run Playwright.
  # The Playwright config + specs are authored by e8 at apps/web/e2e and
  # apps/web/playwright.config.ts, plus @playwright/test in devDependencies.
  # -------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps (includes Playwright once e8 lands)
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start stack (mock backend)
        run: docker compose -f docker-compose.dev.yml up -d --build mock mailwoman
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8080/healthz 240
      - name: run Playwright E2E (mock / proxy mode)
        run: pnpm -C apps/web exec playwright test --project=mock
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # V2 perf/security/conformance gates (plan §3 e11).
  # -------------------------------------------------------------------------

  # Search p95 < 50 ms over 100k (SPEC §23). The gate lives in the Rust test
  # `crates/mw-search/tests/bench.rs`, which asserts p95 < 50 ms; the wrapper
  # runs it in release and surfaces the measured p95 for the log/trend.
  search-bench:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: mw-search p95 gate (<50 ms over 100k)
        run: bash ./scripts/search-bench.sh

  # Bundle-size gate (SPEC §23): the login->inbox entry chunk must be < 250 KB
  # gzip and pdfjs must stay OFF the critical path (a lazy chunk). Both asserted
  # by apps/web/scripts/check-size.mjs (`pnpm run size`).
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install
        run: pnpm -C apps/web install --frozen-lockfile
      - name: build
        run: pnpm -C apps/web build
      - name: bundle-size gate (entry < 250 KB gzip; pdfjs lazy)
        run: pnpm -C apps/web run size

  # OWASP ZAP baseline scan against the running mock stack — the SPEC §27 V2 exit
  # gate. Flaky/slow, so continue-on-error; the HTML report is uploaded.
  zap-baseline:
    runs-on: ubuntu-latest
    needs: [rust, web]
    continue-on-error: true
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - name: build + start stack (mock backend)
        run: docker compose -f docker-compose.dev.yml up -d --build mock mailwoman
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8080/healthz 240
      - name: ZAP baseline scan
        # -I: warnings do not fail the scan (only FAIL-level rules do); -m 5:
        # cap the spider. The report is written to the mounted workspace.
        run: |
          docker run --network host -v "$PWD:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 -I -m 5 \
            -r zap-baseline-report.html
      - name: upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-baseline-report.html
          if-no-files-found: ignore
          retention-days: 7
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # ManageSieve (RFC 5804) conformance vs Dovecot-Pigeonhole — the LIVE path for
  # mw-sieve's ManageSieve CLIENT (plan §6 risk #9). Greenmail has no
  # ManageSieve, so it stays the always-green gate and engine-side rule
  # execution is the always-green path -> this leg is continue-on-error.
  managesieve-conformance:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: boot dovecot-pigeonhole (wait healthy)
        run: docker compose -f docker-compose.dev.yml up -d --wait dovecot-pigeonhole
      - name: ManageSieve conformance (PUTSCRIPT compiles generated Sieve)
        run: bash ./scripts/managesieve/conformance.sh 127.0.0.1 4190 60
      - name: server logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color dovecot-pigeonhole
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # V3 (PIM) CalDAV/CardDAV conformance vs Radicale (plan §3 e11). The env-gated
  # live tests (#[ignore]) in mw-dav / mw-carddav / mw-engine run against a REAL
  # CalDAV/CardDAV server booted from docker-compose.dev.yml:
  #   - mw-dav        — RFC 6764 discovery -> sync-collection (create/sync).
  #   - mw-carddav    — addressbook discovery -> query -> multiget projection.
  #   - mw-engine     — a full sync_pim round-trip: engine A PUTs an event to the
  #                     real collection, engine B (fresh store) pulls it back.
  # Radicale is the DETERMINISTIC green gate (required). Google/M365 quirk
  # fixtures are RECORDED XML exercised by the always-green `rust` job (not here),
  # so this job needs no live OAuth and stays deterministic. Radicale is CI infra
  # (a separate networked GPLv3 program, never linked/shipped — plan §1.5,
  # deny.toml), excluded from the dependency-license scope.
  # -------------------------------------------------------------------------
  caldav-carddav-conformance:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: boot radicale (wait healthy)
        run: docker compose -f docker-compose.dev.yml up -d --wait radicale
      - name: seed radicale collections (VEVENT + VTODO calendars + addressbook)
        run: sh ./scripts/radicale/seed.sh 127.0.0.1 5232 60
      - name: CalDAV/CardDAV live conformance (discovery / sync / round-trip / 412 conflict)
        env:
          RADICALE_URL: "http://127.0.0.1:5232"
          RADICALE_USER: testuser
          RADICALE_PASS: testpass
        run: cargo test -p mw-dav -p mw-carddav -p mw-engine -- --ignored
      - name: server logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color radicale
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # E2E (engine mode): the SAME web UI, but mw-server in MW_MODE=engine driving
  # a REAL IMAP/SMTP account (Greenmail) through mw-engine — the V1 exit gate
  # "engine mode drives a real IMAP account through the unmodified web UI".
  # Boots greenmail + mailwoman-engine (:8090) and runs the `engine` Playwright
  # project (imap-engine.spec.ts): login -> real IMAP mailbox -> compose+send
  # via SMTP -> the message arrives, is MIME-parsed, and renders in the
  # sandboxed reader. Sibling of the mock `e2e` job; both must stay green.
  # -------------------------------------------------------------------------
  e2e-engine:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start engine stack (greenmail + mw-server engine mode)
        run: docker compose -f docker-compose.dev.yml up -d --build --wait greenmail mailwoman-engine
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8090/healthz 240
      - name: run Playwright E2E (engine mode vs Greenmail)
        run: pnpm -C apps/web exec playwright test --project=engine
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color greenmail mailwoman-engine
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-engine
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # -------------------------------------------------------------------------
  # E2E (V3 PIM): the SAME engine-mode server (:8090) as `e2e-engine`, but the
  # `pim` Playwright project drives the four PIM modules (calendar / tasks /
  # notes / contacts) through the real UI — the plan §3 e12 / DoD live-E2E gate
  # "each module reachable from the nav + engine-backed, not just unit-green".
  # The modules run over the engine's auto-seeded Mailwoman-native collections
  # (a default calendar/task-list/notebook/address-book is seeded on first get),
  # so no CalDAV account is needed in the browser — the CalDAV/CardDAV round-trip
  # itself is the separate `caldav-carddav-conformance` (Rust) gate. Sibling of
  # the `e2e` / `e2e-engine` jobs; all three must stay green.
  # -------------------------------------------------------------------------
  e2e-pim:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start engine stack (greenmail + mw-server engine mode)
        run: docker compose -f docker-compose.dev.yml up -d --build --wait greenmail mailwoman-engine
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8090/healthz 240
      - name: run Playwright E2E (PIM modules vs engine)
        run: pnpm -C apps/web exec playwright test --project=pim
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color greenmail mailwoman-engine
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pim
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # ===========================================================================
  # V4 (Crypto & Security) CI jobs — plan §3 e9. Filled by e9 from the e0 stubs
  # once the wasm bundle + crypto/verdict fixtures landed (e1/e6/e8/e8b). Each is a
  # focused, named §27-V4 gate. The interop + verdict tests also run inside the
  # always-green `rust` job's `cargo test --workspace`; these surface them as
  # first-class signals, and `wasm-build` is the ONLY place the 2-OS wasm toolchain
  # is exercised end-to-end (the top V4 risk, §6#2).
  # ===========================================================================

  # wasm-build — the TOP V4 risk (§6#2 / §1.13): build mw-crypto AND mw-sanitize to
  # wasm32 via wasm-pack on BOTH Windows AND Linux (scripts/build-wasm.{sh,ps1},
  # which build both crates), then run a Node smoke that drives the freshly-built
  # bundle through generateKey → encrypt → decrypt and asserts the plaintext
  # round-trips. rPGP/RustCrypto are pure-Rust + wasm-tested; getrandom uses its JS
  # backend on wasm32 (selected by the build scripts). The smoke imports the
  # wasm-pack `--target web` glue directly (initSync + the frozen §2.3 exports) — no
  # pnpm/web build needed, so it stays a pure toolchain-portability gate.
  wasm-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install wasm-pack
        run: cargo install wasm-pack --locked
      - name: build wasm bundles (mw-crypto + mw-sanitize)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then pwsh scripts/build-wasm.ps1; else scripts/build-wasm.sh; fi
      - name: node wasm smoke (generateKey -> encrypt -> decrypt round-trip)
        shell: bash
        run: |
          node --input-type=module -e "import {readFileSync} from 'node:fs'; import {resolve} from 'node:path'; import {pathToFileURL} from 'node:url'; const dir=resolve(process.cwd(),'apps/web/src/wasm/mw-crypto'); const m=await import(pathToFileURL(resolve(dir,'mw_crypto.js')).href); m.initSync({module:readFileSync(resolve(dir,'mw_crypto_bg.wasm'))}); const P='mailwoman wasm smoke round-trip'; const k=m.generateKey({kind:'pgp',userId:'Smoke <smoke@example.com>',passphrase:'pw'}); const c=m.encrypt({kind:'pgp',plaintext:P,recipientPublicKeys:[k.publicKeyArmored]}); const o=m.decrypt({kind:'pgp',ciphertext:c.armoredCiphertext,encryptedPrivateBundle:k.encryptedPrivateBundle,passphrase:'pw'}); if(o.plaintextText!==P) throw new Error('wasm smoke round-trip mismatch: '+JSON.stringify(o.plaintextText)); console.log('ROUNDTRIP_OK');"

  # crypto-interop — decrypt/verify GnuPG- and openssl(Outlook-style)-GENERATED
  # recorded fixtures (fixtures/crypto/**, no live keyserver/DNS — §6#6 / §25). The
  # tests run in the default `native` feature: pgp.rs covers the GnuPG interop
  # vector (decrypt + verify a real `gpg`-produced message); smime.rs the openssl
  # CMS sign/verify + RSA+AES enveloped decrypt + PKCS#12 import.
  crypto-interop:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: PGP/S-MIME interop fixtures (recorded GnuPG/Thunderbird/Outlook)
        run: cargo test -p mw-crypto --test pgp --test smime

  # mail-auth-verdicts — DKIM verdicts against a seeded OFFLINE resolver (e6's
  # SeededTxtCache, RFC 8463 ed25519 vector — deterministic PASS and FAIL, never
  # touches the network, §6#7). The same lib-test path also proves the
  # Received-chain parse, attachment ext-vs-magic risk, and anomaly detection.
  mail-auth-verdicts:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: DKIM/verdict tests (seeded-DNS, pass AND fail)
        run: cargo test -p mw-engine --lib security::verdict

  # -------------------------------------------------------------------------
  # E2E (V4 crypto): the SAME engine-mode server (:8090) as e2e-engine/e2e-pim,
  # but the `crypto` Playwright project drives the V4 crypto/security UIs (key
  # management, Security panel, Compose encrypt + DLP, max-security switch)
  # through the real UI against the real engine + the real WASM crypto worker —
  # the plan §3 e10 / DoD live-E2E gate. The mailwoman-engine image builds the web
  # from source, so the committed apps/web/src/wasm bundles ship in the served app
  # (the worker + wasm stay lazy, off the login->inbox path). e10 authors
  # apps/web/e2e/crypto-*.spec.ts + the `crypto` project in playwright.config.ts
  # (testMatch crypto-*.spec.ts, baseURL the engine :8090); this job WIRES the
  # invocation. Sibling of e2e / e2e-engine / e2e-pim — all four must stay green.
  # -------------------------------------------------------------------------
  e2e-crypto:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: install web deps
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build + start engine stack (greenmail + mw-server engine mode, incl. wasm + DLP rule)
        run: docker compose -f docker-compose.dev.yml -f docker-compose.crypto.yml up -d --build --wait greenmail mailwoman-engine
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://localhost:8090/healthz 240
      - name: run Playwright E2E (V4 crypto/security vs engine + WASM worker)
        run: pnpm -C apps/web exec playwright test --project=crypto
      - name: compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.crypto.yml logs --no-color greenmail mailwoman-engine
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-crypto
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.crypto.yml down -v

  # ===========================================================================
  # V5 (26.6.0) thin-shell CI — plan §3 e8. Build the Tauri v2 desktop shell
  # (Windows + Linux, macOS best-effort) with the §16 bundle-size gate, and the
  # Android APK (the mobile command-name + Kotlin-plugin verification). The live
  # tauri-driver desktop E2E stays scaffolded below for e9 (it owns apps/desktop/e2e).
  # ===========================================================================

  # desktop-shell — the DoD live-build gate (plan §7): `tauri build` produces a
  # launching desktop app on Windows (the hard gate) + Linux (the required CI peer),
  # with macOS best-effort. Runs scripts/build-shells.{sh,ps1}, which builds the
  # shared SPA once, emits the §7.4 bundle-hash, bundles the sibling `mw-server` for
  # self-contained mode, `tauri build --no-bundle`s the shell, and asserts the §16
  # size budgets (thin < 10 MB, self-contained < 40 MB via scripts/check-bundle-size.mjs).
  desktop-shell:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Windows + Linux are required; macOS is best-effort (Windows is the hard live
    # gate, plan §1.9/§7) so a macOS-only failure never reds the pipeline.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      # Linux: Tauri's WebKitGTK webview backend needs these system libs (Windows
      # ships WebView2; macOS ships WKWebView). patchelf is needed by the Tauri build.
      - name: install Linux webview deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev patchelf
      - name: build thin + self-contained desktop shell + §16 size gate
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then pwsh scripts/build-shells.ps1; else bash scripts/build-shells.sh; fi
      - name: upload desktop binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mailwoman-desktop-${{ matrix.os }}
          path: |
            target/release/mailwoman-desktop
            target/release/mailwoman-desktop.exe
          if-no-files-found: ignore
          retention-days: 7

  # android-apk — the mobile-shell CI gate (plan §1.11 / risk #1). This dev machine
  # has no JDK, so `tauri android init/build` + the custom-Kotlin merge cannot be
  # verified locally; they are provisioned only here. The Rust cdylib cross-compile
  # to the Android targets exercises the #[cfg(mobile)] capability bindings and the
  # app-level `mw_*` command registration (t7-e8 reconciliation); android-src/merge.py
  # then merges the tracked Kotlin plugins (UnifiedPush / FLAG_SECURE /
  # EncryptedSharedPreferences keychain) + manifest + Gradle deps into the generated
  # gen/ project before the APK build. continue-on-error keeps this HONEST: a
  # toolchain-provisioning or merge failure is a tracked gap (docs/deploy/mobile-android.md),
  # not a pipeline-red, exactly as planned for the Android/iOS deferrals.
  android-apk:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: install Android NDK
        run: sdkmanager "ndk;27.0.12077973"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: build shared SPA + emit UI-bundle hash (§7.4)
        run: |
          pnpm -C apps/web install --frozen-lockfile
          pnpm -C apps/web build
          node scripts/emit-bundle-hash.mjs
      - name: tauri android init (generate gen/android)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          pnpm -C apps/mobile install
          pnpm -C apps/mobile exec tauri android init --ci
      - name: merge tracked Kotlin plugins + manifest + Gradle deps
        run: python3 apps/mobile/src-tauri/android-src/merge.py
      - name: tauri android build (APK)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: pnpm -C apps/mobile exec tauri android build --apk
      - name: upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mailwoman-android
          path: apps/mobile/src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: ignore
          retention-days: 7

  # desktop-e2e (e9) — the live tauri-driver / WebdriverIO per-capability E2E on
  # Windows (WebView2 ↔ msedgedriver pinning). SCAFFOLDED here; e9 owns apps/desktop/e2e
  # and activates this job (launch → SPA → notification → keychain → capture).
  #
  # desktop-e2e:
  #   runs-on: windows-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - name: install tauri-driver
  #       run: cargo install tauri-driver --locked
  #     - name: build SPA + desktop shell
  #       run: |
  #         pnpm -C apps/web install --frozen-lockfile && pnpm -C apps/web build
  #         cargo build -p mailwoman-desktop
  #     - name: run WebdriverIO live E2E (launch → SPA → notification → keychain → capture)
  #       run: pnpm -C apps/desktop exec wdio run e2e/wdio.conf.ts   # e9 authors this

  # ===========================================================================
  # V6 (26.7.0) CI jobs — plan §3 e12/e13. SCAFFOLDED (commented) by e0; each is
  # activated by its owning executor once the implementation + docker-compose.ci.yml
  # services land. All boot NETWORK-ONLY services (postgres:16 / valkey:8) from
  # docker-compose.ci.yml — mere aggregation, out of cargo-deny scope by design.
  # ===========================================================================

  # store-dual-backend (e1 + e12) — the mock-vs-real backend parity gate: run the
  # mw-store / mw-engine / mw-server suites against BOTH SQLite (in-memory, the
  # default, always) AND a live postgres:16. The table-driven backend-parity test
  # (crates/mw-store/tests/backend_parity.rs) runs each repo method on both backends
  # and asserts identical results; it activates its Postgres leg only when
  # DATABASE_URL_PG is set (this job sets it), otherwise it SKIPs with a clear log
  # (never a silent pass). SQLite-path assertions run regardless (plan §3 e1/§11).
  store-dual-backend:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: boot postgres:16 (wait healthy)
        run: docker compose -f docker-compose.ci.yml up -d --wait postgres
      - name: store/engine/server suites on BOTH backends (SQLite + live Postgres)
        env:
          # The store tests read the PG DSN from DATABASE_URL_PG (or MW_TEST_PG);
          # crates that don't consume it run their default SQLite path unchanged.
          DATABASE_URL_PG: "postgres://mailwoman:mailwoman@127.0.0.1:5432/mailwoman"
        run: cargo test -p mw-store -p mw-engine -p mw-server -- --include-ignored
      - name: postgres logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color postgres
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  # migrate-store-smoke (e1 + e12) — a focused, named gate for the `mailwoman
  # migrate-store` engine (SPEC §4.2): populate a temp SQLite store via the public
  # API, copy it into a freshly-TRUNCATEd postgres:16, and VERIFY row-count +
  # content parity (sealed columns re-open under the shared ServerKey). This is the
  # `migrate_store_sqlite_to_postgres` integration test surfaced as a first-class
  # signal (same posture as crypto-interop / mail-auth-verdicts). It requires a live
  # Postgres (DATABASE_URL_PG), so it lives with the compose stack rather than the
  # always-green `rust` job.
  migrate-store-smoke:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: boot postgres:16 (wait healthy)
        run: docker compose -f docker-compose.ci.yml up -d --wait postgres
      - name: migrate-store SQLite -> Postgres copy + verify
        env:
          DATABASE_URL_PG: "postgres://mailwoman:mailwoman@127.0.0.1:5432/mailwoman"
        run: cargo test -p mw-store --test backend_parity migrate_store_sqlite_to_postgres -- --include-ignored --nocapture
      - name: postgres logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color postgres
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  # cache-valkey (e2 + e12) — the mw-cache layered-cache gate against a live
  # valkey:8: per-class layer routing + TTL, the STRUCTURAL zero-access exclusion
  # (a PlaintextDerived value from a zero-access account is provably never written
  # to Redis/memory), and the Redis-DOWN degradation leg (falls through to store
  # with no data loss). `posture()` output matches the configured matrix (plan §3 e2).
  # The always-run tests exercise the memory-only + Redis-down paths; the
  # #[ignore]d live-Valkey tests activate here via MW_TEST_REDIS_URL +
  # --include-ignored (they self-SKIP with a clear log if the var is unset).
  cache-valkey:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: boot valkey:8 (wait healthy)
        run: docker compose -f docker-compose.ci.yml up -d --wait valkey
      - name: mw-cache tests (live Valkey + Redis-down path)
        env:
          MW_TEST_REDIS_URL: "redis://127.0.0.1:6379"
        run: cargo test -p mw-cache -- --include-ignored
      - name: valkey logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color valkey
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  # e2e-v6 (e13) — the live full-stack E2E: spawn mw-server against REAL postgres:16
  # + REAL valkey:8 + a real browser, driving admin / oauth-apikey / mcp / zeroaccess
  # / cache-posture per capability, and asserting the DB row is CIPHERTEXT for a
  # zero-access account (direct Postgres query) with NO plaintext-derived value in
  # Redis. The happy-path suite runs green against BOTH SQLite and Postgres
  # (backend parity). The full existing web + engine E2E suite runs unchanged
  # (regression gate). e13 authors apps/web/e2e/{admin,oauth-apikey,mcp,zeroaccess,
  # cache-posture}.spec.ts + the Rust integration harness (plan §3 e13).
  #
  e2e-v6:
    runs-on: ubuntu-latest
    needs: [rust, web]
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      # Shared dev server key so sealed columns round-trip within the run (DEV ONLY,
      # never reuse). The standing `serve` reads it from MW_SERVER_KEY.
      MW_SERVER_KEY: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: boot postgres + valkey (wait healthy)
        run: docker compose -f docker-compose.ci.yml up -d --wait postgres valkey
      # The `v6` browser specs log in via the proxy path, so the standing server
      # needs a JMAP backend to proxy to: reuse the deterministic in-repo mock from
      # docker-compose.dev.yml (published on host :8181).
      - name: boot JMAP mock (wait healthy)
        run: docker compose -f docker-compose.dev.yml up -d --build --wait mock
      - name: install web deps
        run: pnpm -C apps/web install --frozen-lockfile
      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
      - name: install Playwright chromium
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: build the SPA (served by the standing server via MW_WEB_DIR)
        run: pnpm -C apps/web build
      - name: build mw-server (mailwoman binary)
        run: cargo build -p mw-server --release
      # ---- Leg 1: the Rust live harness. It spawns its OWN in-process server + JMAP
      # mock and drives the DoD headline proofs — the ciphertext-at-rest DIRECT
      # Postgres query + the SQLite⇄Postgres backend parity. It needs the live PG DSN
      # + Valkey URL, plus the docker-compose container names for its `docker exec
      # psql` / `valkey-cli` inspection (compose names them <project>-<svc>-1).
      # --test-threads=1 keeps the shared Postgres deterministic.
      - name: Rust live E2E harness (vs real postgres + valkey; direct-DB proofs)
        env:
          MW_E13_PG_DSN: "postgres://mailwoman:mailwoman@127.0.0.1:5432/mailwoman"
          MW_E13_REDIS_URL: "redis://127.0.0.1:6379"
          MW_E13_PG_CONTAINER: "mailwoman-ci-postgres-1"
          MW_E13_VALKEY_CONTAINER: "mailwoman-ci-valkey-1"
        run: cargo test -p mw-server --test v6_e2e -- --nocapture --test-threads=1
      # ---- Leg 2: a standing mw-server in PROXY mode (postgres + valkey, admin on,
      # proxying to the JMAP mock) for the Playwright `v6` browser project.
      - name: start mw-server (proxy mode; postgres + valkey; admin enabled)
        env:
          MW_BIND: "127.0.0.1:8090"
          MW_MODE: "proxy"
          MW_DB_PATH: "postgres://mailwoman:mailwoman@127.0.0.1:5432/mailwoman"
          MW_REDIS_URL: "redis://127.0.0.1:6379"
          MW_ADMIN_ENABLED: "true"
          MW_ADMIN_USER: "root"
          MW_ADMIN_PASSWORD: "hunter2"
          MW_COOKIE_SECURE: "false"
          MW_WEB_DIR: "apps/web/dist"
          RUST_LOG: "info"
        run: |
          ./target/release/mailwoman serve > mw-server-v6.log 2>&1 &
          echo "MW_SERVER_PID=$!" >> "$GITHUB_ENV"
      - name: wait for server health
        run: ./scripts/wait-for-health.sh http://127.0.0.1:8090/healthz 120
      # Seed an admin-approved client for the OAuth consent→code→token flow (there is
      # no client-registration endpoint — plan e11 gap c). Mirrors the Rust harness's
      # psql INSERT; ephemeral CI DB so a fixed client_id is safe.
      - name: seed an admin-approved oauth_clients row
        run: |
          docker compose -f docker-compose.ci.yml exec -T postgres \
            psql -U mailwoman -d mailwoman -c \
            "INSERT INTO oauth_clients (client_id,name,redirect_uris,approved_by,created_at) VALUES ('e2e-v6-client','E2E V6 Client','[\"https://app.example/cb\"]','root','2026-01-01T00:00:00Z') ON CONFLICT (client_id) DO NOTHING"
      - name: run Playwright E2E (v6 project vs the live server)
        env:
          MW_E2E_BASE_URL: "http://127.0.0.1:8090"
          MW_E2E_JMAP_URL: "http://127.0.0.1:8181/.well-known/jmap"
          MW_E2E_USERNAME: "testuser@example.org"
          MW_E2E_PASSWORD: "testpass"
          MW_ADMIN_USER: "root"
          MW_ADMIN_PASSWORD: "hunter2"
        run: pnpm -C apps/web exec playwright test --project=v6
      - name: server log on failure
        if: failure()
        run: cat mw-server-v6.log || true
      - name: compose logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.ci.yml logs --no-color || true
          docker compose -f docker-compose.dev.yml logs --no-color mock || true
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-v6
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
      - name: stop mw-server
        if: always()
        run: kill "${MW_SERVER_PID}" 2>/dev/null || true
      - name: tear down
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v || true
          docker compose -f docker-compose.dev.yml down -v || true
