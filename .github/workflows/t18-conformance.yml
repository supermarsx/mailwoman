# t18 (26.18) live-E2E conformance — the "unit-green != wired" gate for the six 26.18
# defense-in-depth hardening seams closed against the 26.17 adversarial-review LOW
# residuals:
#   R1 — ManageSieve pinned-connect egress gate (DNS-rebinding TOCTOU closed);
#   R2 — Note-metadata at-rest reclaim: backfill→count-gated auto-VACUUM + `maintenance
#        vacuum` CLI (SQLite VACUUM / Postgres `VACUUM notes` PLAIN);
#   R3 — a no-resource OAuth token is rejected at /mcp under default-on enforcement,
#        API keys stay exempt;
#   R4 — SSRF: Teredo + ISATAP embedded-IPv4 decode + re-check (public-wrapping allowed);
#   R5 — TOTP enrol-confirm code cannot be replayed at first login;
#   R6 — image-proxy per-account token-bucket rate limit (429 after the threshold).
#
# Owned by t18-e-e2e. Manual + push-to-t18 branches so it never wedges the required
# `ci.yml` gate; the coordinator promotes it to a required check at the 26.18 release
# boundary (mirrors t12..t17-conformance.yml).
#
# Every store-touching leg runs on SQLite unconditionally AND, where relevant, on live
# Postgres when the DSN is present (R2's `VACUUM notes` PLAIN path exercised in BOTH
# dialects over real infrastructure). A leg whose infra/env is absent LOUD-SKIPS (prints
# its reason); it never silently passes.

name: t18-conformance

on:
  workflow_dispatch: {}
  push:
    branches: ["t18-**", "release/26.18**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── The 26.18 hardening live-E2E legs, on SQLite AND live Postgres. ─────────────────
  hardening-postgres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Bring up Postgres
        run: docker compose -f docker-compose.ci.yml up -d --wait postgres
      - name: R4 — SSRF Teredo/ISATAP embedded-IPv4 refused LIVE via the image proxy
        run: cargo test -p mw-server --test t18_e2e_ssrf_teredo_isatap -- --nocapture --test-threads=1
      - name: R1 — ManageSieve pinned-connect gate (metadata/loopback refused, RFC1918 allowed)
        run: cargo test -p mw-server --test t18_e2e_sieve_pin -- --nocapture --test-threads=1
      - name: R6 — image-proxy per-account rate limit returns 429 after the threshold (per-account)
        run: cargo test -p mw-server --test t18_e2e_ratelimit -- --nocapture --test-threads=1
      - name: R3 — no-resource OAuth token rejected at /mcp; API key exempt (default-on)
        run: cargo test -p mw-server --test t18_e2e_mcp_noresource -- --nocapture --test-threads=1
      - name: R5 — TOTP enrol-confirm code cannot be replayed at first login
        run: cargo test -p mw-server --test t18_totp_enrol_confirm_replay -- --nocapture --test-threads=1
      - name: R2 — Note backfill→auto-VACUUM + `maintenance vacuum` CLI — SQLite + live Postgres
        env:
          MW_E14_PG_DSN: "postgres://mailwoman:mailwoman@localhost:5432/mailwoman"
        run: cargo test -p mw-server --test t18_e2e_vacuum -- --nocapture --test-threads=1
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
