# Supply-chain hardening (X5).
#
# Builds the hardened FROM-scratch runtime image with build provenance + an
# embedded SBOM attestation, generates a standalone CycloneDX SBOM, gates the
# image on a vulnerability scan, and signs the pushed image with keyless cosign.
# Also lints the Helm chart, the compose hardening overlay, and runs a bounded
# fuzz smoke pass over the network-facing parsers.
#
# Every tool used is permissive-licensed (Apache-2.0): syft, grype, cosign. No
# non-permissive tool is bundled and no runtime/CDN dependency is introduced —
# these run only in CI.
#
# On pull requests the image is built + scanned + SBOM'd but NOT pushed or
# signed (no registry writes, no OIDC identity). On pushes to master the image
# is pushed to GHCR, scanned by digest, SBOM-attested, and cosign-signed.
name: supply-chain

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # image — build hardened scratch image, SBOM, scan-gate, provenance, sign.
  # ---------------------------------------------------------------------------
  image:
    name: build + sbom + scan + sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR (master only)
      id-token: write          # cosign keyless (OIDC) + provenance
      attestations: write      # build provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: build hardened scratch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-static
          # PR: load locally for scanning. master: push to GHCR.
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # BuildKit-native SLSA provenance + SBOM attestations on the pushed image.
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: resolve scan target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # First tag from metadata-action, present in the local daemon.
            echo "ref=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          fi

      - name: generate SBOM (CycloneDX, syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.target.outputs.ref }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true

      - name: vulnerability scan gate (grype)
        uses: anchore/scan-action@v6
        with:
          image: ${{ steps.target.outputs.ref }}
          fail-build: true
          severity-cutoff: high
          # Alternative gate: aquasecurity/trivy-action with exit-code 1 on
          # CRITICAL,HIGH — kept to one scanner to avoid duplicate CI cost.

      - name: install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: cosign sign (keyless) + attach SBOM
        if: github.event_name != 'pull_request'
        env:
          COSIGN_YES: "true"
          DIGEST_REF: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign "$DIGEST_REF"
          cosign attest --predicate sbom.cdx.json --type cyclonedx "$DIGEST_REF"

  # ---------------------------------------------------------------------------
  # helm-lint — lint + render the hardened chart, then assert the security
  # context the manifests MUST carry (a rendered regression, not just a parse).
  # ---------------------------------------------------------------------------
  helm-lint:
    name: helm lint + rendered hardening assertions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: helm lint
        run: helm lint packaging/helm/mailwoman
      - name: helm template renders
        run: helm template mw packaging/helm/mailwoman > /tmp/rendered.yaml
      - name: assert hardened security context in rendered output
        run: |
          set -euo pipefail
          need() { grep -q "$1" /tmp/rendered.yaml || { echo "MISSING: $1"; exit 1; }; }
          need "readOnlyRootFilesystem: true"
          need "allowPrivilegeEscalation: false"
          need "runAsNonRoot: true"
          need "type: RuntimeDefault"
          grep -Eq "drop:\s*$|- ALL" /tmp/rendered.yaml || { echo "MISSING: capabilities drop ALL"; exit 1; }
          echo "helm-rendered hardening assertions passed"

  # ---------------------------------------------------------------------------
  # hardening-lint — the compose overlay carries the required confinement and
  # every compose file still parses; the Dockerfile keeps the scratch stage.
  # ---------------------------------------------------------------------------
  hardening-lint:
    name: compose + Dockerfile hardening lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: compose files parse
        run: |
          set -euo pipefail
          for f in docker-compose.dev.yml docker-compose.ci.yml docker-compose.crypto.yml; do
            [ -f "$f" ] && docker compose -f "$f" config >/dev/null && echo "ok  $f"
          done
          # The overlay is applied on top of the base for a real config parse.
          docker compose -f docker-compose.dev.yml -f docker-compose.hardened.yml config >/dev/null
          echo "ok  hardened overlay merges"
      - name: assert overlay hardening directives
        run: |
          set -euo pipefail
          f=docker-compose.hardened.yml
          for k in "read_only: true" "no-new-privileges:true" "cap_drop" "- ALL" "tmpfs" "pids_limit"; do
            grep -q "$k" "$f" || { echo "MISSING in $f: $k"; exit 1; }
          done
          echo "compose hardening directives present"
      - name: assert Dockerfile scratch stage
        run: |
          set -euo pipefail
          grep -q "FROM scratch AS runtime-static" Dockerfile || { echo "MISSING scratch stage"; exit 1; }
          grep -q "target-feature=+crt-static" Dockerfile || { echo "MISSING static link flag"; exit 1; }
          grep -q "USER 65532:65532" Dockerfile || { echo "MISSING non-root USER in scratch stage"; exit 1; }
          echo "Dockerfile scratch/static hardening present"

  # ---------------------------------------------------------------------------
  # fuzz-smoke — build every fuzz target and run a bounded pass. This is a
  # regression gate (parsers must not panic on the corpus), not a fuzz campaign.
  # ---------------------------------------------------------------------------
  fuzz-smoke:
    name: fuzz smoke (bounded)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: build + smoke each target
        working-directory: fuzz
        run: |
          set -euo pipefail
          for t in mime_parse sanitize_html imap_parse_response pop3_parse sieve_parse; do
            echo "::group::fuzz $t"
            cargo +nightly fuzz build "$t"
            cargo +nightly fuzz run "$t" -- -max_total_time=45 -runs=200000
            echo "::endgroup::"
          done
