[workspace]
resolver = "3"
members = [
    "crates/mw-jmap",
    "crates/mw-sanitize",
    "crates/mw-render",
    "crates/mw-store",
    "crates/mw-mock-jmap",
    "crates/mw-server",
]

[workspace.package]
version = "0.0.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/supermarsx/mailwoman"

[workspace.dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "io-util", "signal", "net", "time"] }
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite", "migrate", "macros", "chrono"] }
chacha20poly1305 = "0.10"
rand = "0.8"
hex = "0.4"
base64 = "0.22"
bytes = "1"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ammonia = "4"
rust-embed = "8"
mime_guess = "2"
clap = { version = "4", features = ["derive", "env"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }

mw-jmap = { path = "crates/mw-jmap" }
mw-sanitize = { path = "crates/mw-sanitize" }
mw-store = { path = "crates/mw-store" }
mw-mock-jmap = { path = "crates/mw-mock-jmap" }

[profile.release]
overflow-checks = true
