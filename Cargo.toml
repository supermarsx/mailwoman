[workspace]
resolver = "3"
members = [
    "crates/mw-jmap",
    "crates/mw-sanitize",
    "crates/mw-render",
    "crates/mw-store",
    "crates/mw-mock-jmap",
    "crates/mw-server",
    "crates/mw-mime",
    "crates/mw-imap",
    "crates/mw-pop3",
    "crates/mw-smtp",
    "crates/mw-engine",
    "crates/mw-autoconfig",
    "crates/mw-search",
    "crates/mw-sieve",
    "crates/mw-export",
]

[workspace.package]
version = "26.3.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/supermarsx/mailwoman"

[workspace.dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "io-util", "signal", "net", "time", "sync"] }
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite", "migrate", "macros", "chrono"] }
chacha20poly1305 = "0.10"
rand = "0.8"
hex = "0.4"
base64 = "0.22"
bytes = "1"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ammonia = "4"
rust-embed = "8"
mime_guess = "2"
clap = { version = "4", features = ["derive", "env"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }

# V1 mail-engine deps (all MIT/Apache-2.0 dual — vetted, no copyleft, no async-std).
# `imap-proto` is the IMAP response *parser*; the command/extension layer is hand-rolled
# over tokio + rustls (plan §1.1). `mail-parser`/`mail-builder` are the Stalwart *library*
# crates (MIT/Apache), NOT the AGPL server (plan §1.2).
imap-proto = "0.16"
mail-parser = "0.11"
mail-builder = "0.4"
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-pki-types = "1"
webpki-roots = "1"
encoding_rs = "0.8"
async-trait = "0.1"
data-encoding = "2"

# V2 deps (plan §1.11 — all confirmed permissive, no GPL/LGPL/AGPL; Win+Linux).
# `tantivy` is the engine-side full-text index (mw-search, e1). `tokio-tungstenite`
# + `futures-util` back the JMAP WebSocket push server (mw-server, e10).
# `tokio-rustls-acme` is the ACME/TLS listener, compatible with the tree's
# rustls 0.23 / tokio-rustls 0.26. `vanilla-extract`/`pdfjs-dist`/`idb` are web-only.
tantivy = "0.26"
tokio-tungstenite = "0.30"
tokio-rustls-acme = "0.9"
futures-util = "0.3"

mw-jmap = { path = "crates/mw-jmap" }
mw-sanitize = { path = "crates/mw-sanitize" }
mw-store = { path = "crates/mw-store" }
mw-mock-jmap = { path = "crates/mw-mock-jmap" }
mw-mime = { path = "crates/mw-mime" }
mw-imap = { path = "crates/mw-imap" }
mw-pop3 = { path = "crates/mw-pop3" }
mw-smtp = { path = "crates/mw-smtp" }
mw-engine = { path = "crates/mw-engine" }
mw-autoconfig = { path = "crates/mw-autoconfig" }
mw-search = { path = "crates/mw-search" }
mw-sieve = { path = "crates/mw-sieve" }
mw-export = { path = "crates/mw-export" }

[profile.release]
overflow-checks = true
